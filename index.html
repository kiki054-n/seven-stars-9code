<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seven Stars 9 Code — ワイン評価ビジュアライザー</title>
  <style>
    :root {
      --bg:      #0a0908;
      --bg2:     #131210;
      --bg3:     #1a1815;
      --glass:   rgba(12,11,9,0.85);
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.16);
      --text:    #e8e5dc;
      --text2:   #9c9a91;
      --text3:   #5a5855;
      --real:    #378ADD;
      --imag:    #639922;
      --god:     #BA7517;
      --panel-w: 300px;
      --font:    'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; }

    /* ── LEFT: canvas area ── */
    #canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      /* canvas fills this area */
    }

    #cv {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
    }

    /* title HUD */
    #hud-title {
      position: absolute; top: 24px; left: 24px; pointer-events: none; z-index: 10;
    }
    .hud-eyebrow {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--god); margin-bottom: 5px;
    }
    .hud-h1 {
      font-size: clamp(18px, 2.8vw, 32px); font-weight: 600;
      letter-spacing: .04em; line-height: 1.15;
      background: linear-gradient(120deg, var(--real) 0%, var(--imag) 50%, var(--god) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* axis filter tabs */
    #hud-tabs {
      position: absolute; top: 20px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
    }
    .axis-tab {
      padding: 4px 11px; border-radius: 20px; border: 0.5px solid;
      font-size: 10px; cursor: pointer; transition: all .18s;
      background: rgba(10,9,8,0.65); font-family: var(--font);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .tab-all  { border-color: var(--border2); color: var(--text2); }
    .tab-real { border-color: var(--real); color: var(--real); }
    .tab-imag { border-color: var(--imag); color: var(--imag); }
    .tab-god  { border-color: var(--god);  color: var(--god);  }
    .tab-all.active  { background: rgba(156,154,145,.2); color: var(--text);  border-color: var(--text2); }
    .tab-real.active { background: rgba(55,138,221,.18); color: var(--real);  border-color: var(--real); }
    .tab-imag.active { background: rgba(99,153,34,.18);  color: var(--imag);  border-color: var(--imag); }
    .tab-god.active  { background: rgba(186,117,23,.18); color: var(--god);   border-color: var(--god);  }

    /* zoom controls — bottom centre of canvas */
    #zoom-controls {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; align-items: center;
      background: var(--glass); border: 0.5px solid var(--border2);
      border-radius: 24px; overflow: hidden;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .zoom-btn {
      width: 36px; height: 32px; background: transparent; border: none;
      color: var(--text2); font-size: 16px; cursor: pointer;
      font-family: var(--font); display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .zoom-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .zoom-btn:active { background: rgba(255,255,255,0.12); }
    .zoom-sep { width: 0.5px; height: 16px; background: var(--border2); flex-shrink: 0; }
    #zoom-label {
      padding: 0 11px; font-size: 10px; color: var(--text3);
      min-width: 46px; text-align: center; pointer-events: none; white-space: nowrap;
    }

    /* info panel — bottom left of canvas */
    #hud-info {
      position: absolute; bottom: 64px; left: 16px; z-index: 10;
      max-width: calc(100% - 32px);
      background: var(--glass); border: 0.5px solid var(--border2);
      border-radius: 10px; padding: 10px 14px;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      width: min(280px, calc(100% - 32px));
    }
    .info-title { font-size: 11px; font-weight: 500; margin-bottom: 3px; color: var(--text); }
    .info-desc  { font-size: 10px; color: var(--text2); line-height: 1.6; }

    /* hint */
    #hint-float {
      position: absolute; bottom: 20px; left: 16px; z-index: 10;
      font-size: 9px; color: var(--text3); pointer-events: none; line-height: 1.9;
    }

    /* ── RIGHT: slider panel ── */
    #side-panel {
      width: var(--panel-w);
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 0.5px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* panel header with score */
    #panel-header {
      padding: 16px 16px 12px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .panel-eyebrow {
      font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 8px;
    }
    .score-row {
      display: flex; align-items: baseline; gap: 10px;
    }
    .score-big {
      font-size: 36px; font-weight: 600; line-height: 1;
      background: linear-gradient(120deg, var(--real), var(--imag), var(--god));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .score-meta { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .score-lbl  { font-size: 9px; color: var(--text3); }
    .bar-track  { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 2px; background: linear-gradient(90deg,var(--real),var(--imag),var(--god)); transition: width .45s; }

    /* scrollable slider area */
    #panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 14px 20px;
      /* thin custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* axis groups */
    .axis-block { margin-bottom: 18px; }
    .axis-block:last-child { margin-bottom: 0; }

    .axis-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 500; letter-spacing: .06em;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 0.5px solid var(--border);
    }
    .axis-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .axis-sub { font-size: 9px; color: var(--text3); margin-left: auto; font-weight: 400; }

    /* individual slider row */
    .sl-row {
      display: grid;
      grid-template-columns: 52px 1fr 26px;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .sl-row:last-child { margin-bottom: 0; }
    .sl-name { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-val  { font-size: 10px; color: var(--text3); text-align: right; font-variant-numeric: tabular-nums; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      border-radius: 2px; background: var(--border2); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: var(--text); border: 2px solid var(--bg2);
      cursor: pointer; transition: transform .12s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--text); border: 2px solid var(--bg2); cursor: pointer;
    }

    /* panel footer legend */
    #panel-footer {
      padding: 10px 14px;
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 5px;
    }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text3); }
    .leg-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── MOBILE: stack vertically ── */
    @media (max-width: 640px) {
      :root { --panel-w: 100vw; }
      html, body { overflow: auto; height: auto; }
      body { flex-direction: column; }
      #canvas-area { height: 60vmax; flex: none; }
      #side-panel  { width: 100%; border-left: none; border-top: 0.5px solid var(--border2); max-height: none; }
      #panel-body  { max-height: 60vh; }
      #hud-tabs    { display: none; }
    }
  </style>
</head>
<body>

<!-- ════════════ LEFT: 3D Canvas ════════════ -->
<div id="canvas-area">
  <canvas id="cv"></canvas>

  <div id="hud-title">
    <p class="hud-eyebrow">TTT Theory — Wine Evaluation</p>
    <h1 class="hud-h1">Seven Stars<br>9 Code</h1>
  </div>

  <div id="hud-tabs">
    <button class="axis-tab tab-all  active" data-axis="all">すべて</button>
    <button class="axis-tab tab-real"        data-axis="real">実数 Body</button>
    <button class="axis-tab tab-imag"        data-axis="imag">虚数 Soul</button>
    <button class="axis-tab tab-god"         data-axis="god">副虚数 Spirit</button>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-out">−</button>
    <div class="zoom-sep"></div>
    <span id="zoom-label">100%</span>
    <div class="zoom-sep"></div>
    <button class="zoom-btn" id="btn-zoom-reset" style="font-size:12px;">⟳</button>
    <div class="zoom-sep"></div>
    <button class="zoom-btn" id="btn-zoom-in">＋</button>
  </div>

  <div id="hud-info">
    <p class="info-title" id="info-title">頂点をクリックして詳細を確認</p>
    <p class="info-desc"  id="info-desc">ドラッグで回転、ホイール／ピンチでズーム。ダブルクリックで自動回転ON/OFF。</p>
  </div>

  <div id="hint-float">ドラッグ: 回転 &nbsp;|&nbsp; ホイール: ズーム</div>
</div>

<!-- ════════════ RIGHT: Slider Panel ════════════ -->
<aside id="side-panel">

  <!-- Score header -->
  <div id="panel-header">
    <p class="panel-eyebrow">Nine Code — Score Input</p>
    <div class="score-row">
      <div class="score-big" id="score-num">60</div>
      <div class="score-meta">
        <span class="score-lbl">グラン・ヴァン指数</span>
        <div class="bar-track"><div class="bar-fill" id="score-bar" style="width:60%"></div></div>
      </div>
    </div>
  </div>

  <!-- Sliders -->
  <div id="panel-body">
    <div class="axis-block" id="block-real">
      <div class="axis-label">
        <span class="axis-dot" style="background:var(--real)"></span>
        <span style="color:var(--real)">実数軸 — Body</span>
        <span class="axis-sub">正六面体</span>
      </div>
      <!-- filled by JS -->
    </div>
    <div class="axis-block" id="block-imag">
      <div class="axis-label">
        <span class="axis-dot" style="background:var(--imag)"></span>
        <span style="color:var(--imag)">虚数軸 — Soul</span>
        <span class="axis-sub">正八面体</span>
      </div>
    </div>
    <div class="axis-block" id="block-god">
      <div class="axis-label">
        <span class="axis-dot" style="background:var(--god)"></span>
        <span style="color:var(--god)">副虚数軸 — Spirit</span>
        <span class="axis-sub">正四面体</span>
      </div>
    </div>
  </div>

  <!-- Legend footer -->
  <div id="panel-footer">
    <div class="leg-item"><span class="leg-dot" style="background:var(--real)"></span>実数（正六面体）物質・環境</div>
    <div class="leg-item"><span class="leg-dot" style="background:var(--imag)"></span>虚数（正八面体）変化・時間</div>
    <div class="leg-item"><span class="leg-dot" style="background:var(--god)"></span>副虚数（正四面体）意志・神性</div>
  </div>
</aside>

<script>
/* ─── Data ─── */
const NODES = [
  { id:'x',  label:'土壌',      sub:'$x$ — 大地・環境',     axis:'real', color:'#378ADD', ang:[0,-1,0]           },
  { id:'y',  label:'果実',      sub:'$y$ — 素材・物質',     axis:'real', color:'#378ADD', ang:[0,1,0]            },
  { id:'z',  label:'設備',      sub:'$z$ — 器・建物',       axis:'real', color:'#185FA5', ang:[1,0,0]            },
  { id:'i1', label:'発酵',      sub:'$i$ — 変化・働き',     axis:'imag', color:'#639922', ang:[-1,0,0]           },
  { id:'i2', label:'熟成',      sub:'$i$ — 時間の流れ',     axis:'imag', color:'#3B6D11', ang:[0,0,-1]           },
  { id:'i3', label:'香り',      sub:'$i$ — 波動・感情',     axis:'imag', color:'#3B6D11', ang:[0,0,1]            },
  { id:'j1', label:'テロワール',sub:'$j$ — 土地の記憶',     axis:'god',  color:'#BA7517', ang:[.577,.577,.577]   },
  { id:'j2', label:'醸造哲学',  sub:'$j$ — 意志・愛',       axis:'god',  color:'#854F0B', ang:[-.577,-.577,.577] },
  { id:'j3', label:'畏敬',      sub:'$j$ — 調和・運命受容', axis:'god',  color:'#633806', ang:[.577,-.577,-.577] },
];
const DESC = {
  x:  'ブドウの樹が根を張る大地。土壌の成分・水はけ・ミネラルがワインの骨格を決める実数の基盤。',
  y:  '水分・皮・種・糖分という物質的素材。ブドウが持つポテンシャルが最終的なワインの限界を規定する。',
  z:  '樽・ボトル・醸造所。素晴らしい設備（正六面体）があっても、それだけでは感動は生まれない。',
  i1: '酵母が糖をアルコールに変える目に見えない働き。物質（実数）が見えないエネルギー（虚数）へ転換される瞬間。',
  i2: '樽の中でゆっくりと流れる時間。時間という不可逆の力が、ワインに奥行きと複雑性を与える。',
  i3: 'グラスから立ち上り人の記憶を揺さぶる波動。数値化できない感情の次元。',
  j1: 'その土地だけが持つ太陽・風・大地の記憶。コントロール不能な神の領域（正四面体）。',
  j2: 'どんなワインを造りたいか——利益でも流行でもなく、美しさを追う純粋な意志。',
  j3: '天候や運命を受け入れ、それすらも味に変える調和の力。人知を超えた畏敬の念。',
};
const EDGES = [
  ['x','z'],['x','i1'],['x','i2'],['x','i3'],
  ['y','z'],['y','i1'],['y','i2'],['y','i3'],
  ['z','j1'],['z','j2'],['z','j3'],
  ['i1','j1'],['i1','j2'],['i1','j3'],
  ['i2','j1'],['i2','j2'],['i2','j3'],
  ['x','y'],['i2','i3'],
];

/* ─── State ─── */
const vals = {};
NODES.forEach(n => { vals[n.id] = 60; });

let rotX = 0.4, rotY = -0.5;
let zoom = 1.0;
const ZOOM_MIN = 0.25, ZOOM_MAX = 4.0, ZOOM_STEP = 0.15;

let dragging = false, lastX = 0, lastY = 0;
let pinching = false, lastPinchD = 0;
let hoveredNode = null, activeAxis = 'all', animating = true;

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, CX, CY, BASE_R;
const BASE_R_FRAC = 0.23;
const FONT = "'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif";

/* ─── Resize ─── */
function resize() {
  const dpr = devicePixelRatio || 1;
  const area = document.getElementById('canvas-area');
  W = cv.width  = area.offsetWidth  * dpr;
  H = cv.height = area.offsetHeight * dpr;
  CX = W / 2; CY = H / 2;
  BASE_R = Math.min(W, H) * BASE_R_FRAC;
  draw();
}
window.addEventListener('resize', () => { resize(); });

/* ─── Projection ─── */
function proj(x, y, z) {
  const R = BASE_R * zoom;
  const cy = Math.cos(rotY), sy = Math.sin(rotY);
  const rx  =  x*cy - z*sy;
  const rz0 =  x*sy + z*cy;
  const cx2 = Math.cos(rotX), sx2 = Math.sin(rotX);
  const ry  =  y*cx2 - rz0*sx2;
  const rz  =  y*sx2 + rz0*cx2;
  const fov = 5;
  const scale = fov / (fov + rz / (BASE_R * 2)) * (Math.min(W, H) * 0.46);
  return { sx: CX + rx / BASE_R * scale, sy: CY - ry / BASE_R * scale, z: rz };
}
function getPos(n) {
  const R = BASE_R * zoom;
  const v = vals[n.id] / 100;
  return proj(n.ang[0]*R*v, n.ang[1]*R*v, n.ang[2]*R*v);
}
function nodeAlpha(n) {
  return activeAxis === 'all' ? 1 : (n.axis === activeAxis ? 1 : 0.07);
}

/* ─── Draw ─── */
function draw() {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);
  const ps = {};
  NODES.forEach(n => { ps[n.id] = getPos(n); });
  const dpr = devicePixelRatio || 1;

  EDGES.forEach(([a, b]) => {
    const al = Math.min(nodeAlpha(NODES.find(x=>x.id===a)), nodeAlpha(NODES.find(x=>x.id===b)));
    ctx.beginPath();
    ctx.moveTo(ps[a].sx, ps[a].sy);
    ctx.lineTo(ps[b].sx, ps[b].sy);
    ctx.strokeStyle = `rgba(200,185,145,${0.38*al})`;
    ctx.lineWidth   = Math.max(1.0, 1.8*dpr*Math.min(zoom, 1.5));
    ctx.stroke();
  });

  [...NODES].sort((a,b) => ps[a.id].z - ps[b.id].z).forEach(n => {
    const p   = ps[n.id];
    const al  = nodeAlpha(n);
    const isH = hoveredNode === n.id;
    const v   = vals[n.id] / 100;
    const nodeR = Math.max(7, (8 + v*14)*dpr*Math.min(zoom, 2));

    if (isH) {
      ctx.beginPath(); ctx.arc(p.sx, p.sy, nodeR+7*dpr, 0, Math.PI*2);
      ctx.fillStyle = n.color+'28'; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(p.sx, p.sy, nodeR, 0, Math.PI*2);
    ctx.fillStyle = n.color + Math.round(al*255).toString(16).padStart(2,'0');
    ctx.fill();
    if (isH) { ctx.strokeStyle = n.color; ctx.lineWidth = 1.5*dpr; ctx.stroke(); }

    const fs = Math.round(Math.max(9, Math.min(15, 11*dpr*Math.min(zoom,1.5))));
    ctx.font         = `${isH?600:400} ${fs}px ${FONT}`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = `rgba(255,255,255,${0.92*al})`;
    ctx.fillText(n.label, p.sx, p.sy);

    const fsS = Math.round(Math.max(7, Math.min(12, 9*dpr*Math.min(zoom,1.5))));
    ctx.font      = `400 ${fsS}px ${FONT}`;
    ctx.fillStyle = `rgba(255,255,255,${0.48*al})`;
    ctx.fillText(vals[n.id], p.sx, p.sy + nodeR + 7*dpr);
  });
}

/* ─── Hit test ─── */
function hitTest(mx, my) {
  const ps = {}, dpr = devicePixelRatio||1;
  NODES.forEach(n => { ps[n.id] = getPos(n); });
  for (const n of NODES) {
    const p = ps[n.id], v = vals[n.id]/100;
    const r = Math.max(7, (8+v*14)*dpr*Math.min(zoom,2)) + 5*dpr;
    const dx = mx-p.sx, dy = my-p.sy;
    if (dx*dx+dy*dy < r*r) return n.id;
  }
  return null;
}
function evXY(e) {
  const rect = cv.getBoundingClientRect(), dpr = devicePixelRatio||1;
  const src  = e.touches ? e.touches[0] : e;
  return { mx:(src.clientX-rect.left)*dpr, my:(src.clientY-rect.top)*dpr };
}

/* ─── Zoom ─── */
function applyZoom(delta) {
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom*(1+delta)));
  updateZoomLabel(); draw();
}
function updateZoomLabel() {
  document.getElementById('zoom-label').textContent = Math.round(zoom*100)+'%';
}
function resetView() {
  zoom = 1.0; rotX = 0.4; rotY = -0.5; animating = true;
  updateZoomLabel(); draw();
}

/* ─── Canvas mouse ─── */
cv.addEventListener('mousedown', e => {
  const {mx,my} = evXY(e), hit = hitTest(mx,my);
  if (hit) {
    const n = NODES.find(x=>x.id===hit);
    document.getElementById('info-title').textContent = n.label+' ― '+n.sub;
    document.getElementById('info-desc').textContent  = DESC[hit];
    // highlight matching slider
    document.querySelectorAll('.sl-row').forEach(r => r.style.opacity='0.4');
    const row = document.getElementById('row-'+hit);
    if (row) { row.style.opacity='1'; row.style.transition='opacity .2s'; }
    return;
  }
  // reset highlights
  document.querySelectorAll('.sl-row').forEach(r => r.style.opacity='1');
  dragging = true; animating = false;
  lastX = e.clientX; lastY = e.clientY;
  cv.style.cursor = 'grabbing';
});
cv.addEventListener('mousemove', e => {
  if (dragging) {
    rotY += (e.clientX-lastX)*0.007; rotX += (e.clientY-lastY)*0.007;
    lastX = e.clientX; lastY = e.clientY; draw(); return;
  }
  const {mx,my} = evXY(e); hoveredNode = hitTest(mx,my);
  cv.style.cursor = hoveredNode ? 'pointer' : 'grab'; draw();
});
cv.addEventListener('mouseup',    () => { dragging=false; cv.style.cursor=hoveredNode?'pointer':'grab'; });
cv.addEventListener('mouseleave', () => { dragging=false; hoveredNode=null; cv.style.cursor='grab'; draw(); });
cv.addEventListener('dblclick', e => {
  const {mx,my}=evXY(e); if(hitTest(mx,my)) return;
  animating = !animating;
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaMode===1 ? e.deltaY*0.05 : e.deltaY*0.001;
  applyZoom(-d*0.8);
}, {passive:false});

/* ─── Touch ─── */
function touchDist(t) {
  const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
cv.addEventListener('touchstart', e => {
  if (e.touches.length===2) { pinching=true; dragging=false; animating=false; lastPinchD=touchDist(e.touches); }
  else { const t=e.touches[0]; lastX=t.clientX; lastY=t.clientY; dragging=true; animating=false; }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove', e => {
  if (e.touches.length===2 && pinching) { const d=touchDist(e.touches); applyZoom(d/lastPinchD-1); lastPinchD=d; }
  else if (e.touches.length===1 && dragging) { const t=e.touches[0]; rotY+=(t.clientX-lastX)*0.007; rotX+=(t.clientY-lastY)*0.007; lastX=t.clientX; lastY=t.clientY; draw(); }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchend', () => { dragging=false; pinching=false; });

/* ─── Zoom buttons ─── */
document.getElementById('btn-zoom-in').addEventListener('click',    ()=>applyZoom( ZOOM_STEP));
document.getElementById('btn-zoom-out').addEventListener('click',   ()=>applyZoom(-ZOOM_STEP));
document.getElementById('btn-zoom-reset').addEventListener('click', ()=>resetView());

/* ─── Axis tabs ─── */
document.querySelectorAll('.axis-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.axis-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeAxis=btn.dataset.axis; draw();
  });
});

/* ─── Score ─── */
function updateScore() {
  const avg = Math.round(Object.values(vals).reduce((a,b)=>a+b,0)/NODES.length);
  document.getElementById('score-num').textContent = avg;
  document.getElementById('score-bar').style.width = avg+'%';
}

/* ─── Build sliders ─── */
const axisMap = {real:'block-real', imag:'block-imag', god:'block-god'};
NODES.forEach(n => {
  const block = document.getElementById(axisMap[n.axis]);
  const row   = document.createElement('div');
  row.className = 'sl-row';
  row.id        = 'row-'+n.id;
  row.innerHTML = `
    <span class="sl-name" style="color:${n.color}" title="${n.sub}">${n.label}</span>
    <input type="range" min="10" max="100" value="60" step="1" id="s-${n.id}" style="accent-color:${n.color}">
    <span class="sl-val" id="v-${n.id}">60</span>
  `;
  block.appendChild(row);
  row.querySelector('input').addEventListener('input', e => {
    vals[n.id] = +e.target.value;
    document.getElementById('v-'+n.id).textContent = e.target.value;
    updateScore(); draw();
  });
  // hover: highlight node
  row.addEventListener('mouseenter', () => { hoveredNode = n.id; draw(); });
  row.addEventListener('mouseleave', () => { hoveredNode = null;  draw(); });
});

/* ─── Loop ─── */
function loop() { if(animating){ rotY+=0.003; draw(); } requestAnimationFrame(loop); }
updateScore(); updateZoomLabel(); resize(); loop();
</script>
</body>
</html>
